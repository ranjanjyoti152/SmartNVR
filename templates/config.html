<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/static/styles.css" rel="stylesheet">
    <title>Settings</title>
</head>
<body>
    <div class="container mx-auto">
        <h1 class="text-3xl my-4">Settings</h1>
        <form action="/config" method="post" enctype="multipart/form-data">
            <div class="mb-4">
                <h2 class="text-xl">General Settings</h2>
                <label for="setting1" class="block">Setting 1</label>
                <input type="text" id="setting1" name="setting1" class="border rounded p-2">
            </div>
            <div class="mb-4">
                <h2 class="text-xl">AI Detection Settings</h2>
                <label for="yolov5_model" class="block">Upload YOLOv5 Model</label>
                <input type="file" id="yolov5_model" name="yolov5_model" class="border rounded p-2">
            </div>
            <div class="mb-4">
                <h2 class="text-xl">Event Emailing Settings</h2>
                <label for="email" class="block">Email Address</label>
                <input type="email" id="email" name="email" class="border rounded p-2">
            </div>
            <button type="submit" class="bg-blue-500 text-white p-2 rounded">Save Settings</button>
        </form>
    </div>
</body>
</html>
