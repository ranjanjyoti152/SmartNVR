<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/static/styles.css" rel="stylesheet">
    <title>Event Logs</title>
</head>
<body>
    <div class="container mx-auto">
        <h1 class="text-3xl my-4">Event Logs</h1>
        <table class="min-w-full border-collapse border border-gray-300">
            <thead>
                <tr>
                    <th class="border border-gray-300 p-2">Timestamp</th>
                    <th class="border border-gray-300 p-2">Event Type</th>
                    <th class="border border-gray-300 p-2">Details</th>
                </tr>
            </thead>
            <tbody>
                <!-- Example event log -->
                <tr>
                    <td class="border border-gray-300 p-2">2023-03-31 12:00:00</td>
                    <td class="border border-gray-300 p-2">Detection</td>
                    <td class="border border-gray-300 p-2">Person detected in ROI</td>
                </tr>
                <!-- Repeat for more events -->
            </tbody>
        </table>
    </div>
</body>
</html>
