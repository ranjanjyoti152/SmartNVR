<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/static/styles.css" rel="stylesheet">
    <title>Admin Panel</title>
</head>
<body>
    <div class="container mx-auto">
        <h1 class="text-3xl my-4">Admin Panel</h1>
        <h2 class="text-xl">Manage Users</h2>
        <form action="/admin" method="post">
            <div class="mb-4">
                <label for="username" class="block">Username</label>
                <input type="text" id="username" name="username" class="border rounded p-2">
            </div>
            <div class="mb-4">
                <label for="email" class="block">Email</label>
                <input type="email" id="email" name="email" class="border rounded p-2">
            </div>
            <button type="submit" class="bg-blue-500 text-white p-2 rounded">Add User</button>
        </form>
        <h2 class="text-xl my-4">Existing Users</h2>
        <ul>
            <!-- Example user -->
            <li class="border-b py-2">User1 <button class="text-red-500">Delete</button></li>
            <!-- Repeat for more users -->
        </ul>
    </div>
</body>
</html>
